name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: 빌드 확인
        run: |
          echo "Hello, BrandonLee"
          echo "Build stage 완료!"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: 테스트 실행
        run: |
          echo "Test stage 실행 중..."
          echo "Hello, BrandonLee" > output.txt
          grep "BrandonLee" output.txt
          echo "Test 완료!"
